name: mytharium
description: Explore gods and deities from world mythologies.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/Greek/Olympians/
    - assets/images/Greek/Titans/
    - assets/images/Greek/Primordial/
    - assets/images/Greek/Underworld/
    - assets/images/Greek/SeaGods/
    - assets/images/Greek/Heroes/
    - assets/images/Greek/Monsters/
    - assets/images/Greek/Cosmology/
    - assets/images/Egypt/
    - assets/images/Egypt/Death/
    - assets/images/Egypt/Ennead/
    - assets/images/Egypt/Fertility/
    - assets/images/Egypt/Knowledge/
    - assets/images/Egypt/Sun&Sky/
    - assets/images/Egypt/Creatures/
    - assets/images/Egypt/Cosmology/
    - assets/images/Hindu/
    - assets/images/Hindu/Trimurti/
    - assets/images/Hindu/Tridevi/
    - assets/images/Hindu/Dashavatara/
    - assets/images/Hindu/Devas/
    - assets/images/Hindu/Figures/
    - assets/images/Hindu/Devi/
    - assets/images/Hindu/Creatures/
    - assets/images/Hindu/Cosmology/
    - assets/images/Nordik/
    - assets/images/Nordik/Aesir/
    - assets/images/Nordik/Vanir/
    - assets/images/Nordik/Jotun/
    - assets/images/Nordik/Mythical/
    - assets/images/Nordik/Figures/
    - assets/images/Nordik/Cosmology/
    - assets/images/Chinese/
    - assets/images/Chinese/Court/
    - assets/images/Chinese/Primordial/
    - assets/images/Chinese/Nature/
    - assets/images/Chinese/Underworld/
    - assets/images/Chinese/Hero/
    - assets/images/Chinese/Creature/
    - assets/images/Chinese/Cosmology/
    - assets/images/Japanese/
    - assets/images/Japanese/Celestial/
    - assets/images/Japanese/Primordial/
    - assets/images/Japanese/Nature/
    - assets/images/Japanese/Underworld/
    - assets/images/Japanese/War/
    - assets/images/Japanese/Lucky/
    - assets/images/Japanese/Hero/
    - assets/images/Japanese/Creature/
    - assets/images/Japanese/Cosmology/
    - assets/images/Mythic/
    - assets/audio/

  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
        - asset: assets/fonts/Cinzel-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cinzel-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cinzel-ExtraBold.ttf
          weight: 800
    - family: CinzelDecorative
      fonts:
        - asset: assets/fonts/CinzelDecorative-Regular.ttf
        - asset: assets/fonts/CinzelDecorative-Bold.ttf
          weight: 700
        - asset: assets/fonts/CinzelDecorative-Black.ttf
          weight: 900
    - family: MedievalSharp
      fonts:
        - asset: assets/fonts/MedievalSharp-Regular.ttf
    - family: YatraOne
      fonts:
        - asset: assets/fonts/YatraOne-Regular.ttf

